version: 2
updates:
  - package-ecosystem: npm
    cooldown:
      default-days: 7
    directory: '/'
    schedule:
      interval: monthly
    versioning-strategy: increase
    open-pull-requests-limit: 1
    groups:
      dependencies:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: github-actions
    cooldown:
      default-days: 7
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
